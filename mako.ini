background-color=#141618
text-color=#ECE7DF
border-color=#262A2D
progress-color=over #2D251C
width=420
height=110
padding=12
border-size=2
border-radius=12
font=Liberation Sans 11
anchor=top-right
outer-margin=20
default-timeout=5000
max-icon-size=32
icons=1
markup=1
format=<b>%s</b>\n%b

[urgency=low]
background-color=#141618
text-color=#8A7A9C
border-color=#262A2D
default-timeout=3000

[urgency=normal]
background-color=#141618
text-color=#ECE7DF
border-color=#262A2D
default-timeout=5000

[urgency=high]
background-color=#141618
text-color=#F8F4EE
border-color=#E08763
default-timeout=0

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false
